# プロジェクトローカル。work_log ルートの pre-commit と二重にならないよう、
# ここではこのディレクトリだけを対象にする場合は pre-commit run --files で指定する。
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^private/Project/GA4_Remote _MCP/
      - id: ruff-format
        files: ^private/Project/GA4_Remote _MCP/
